<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rovás Konverter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f13;
      --surface: #16161e;
      --surface2: #1e1e2a;
      --border: #2a2a3a;
      --accent: #7c6af7;
      --accent-light: #a78bfa;
      --accent-glow: rgba(124, 106, 247, 0.15);
      --text: #e2e2f0;
      --text-muted: #8888aa;
      --success: #4ade80;
      --error: #f87171;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      padding: 1.5rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--surface);
    }

    .logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    header h1 {
      font-size: 1.3rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent-light), #c4b5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header p {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 0.1rem;
    }

    /* Main */
    main {
      flex: 1;
      padding: 2rem;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
    }

    /* Config panel */
    .config-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.2rem 1.5rem;
      margin-bottom: 1.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
    }

    .config-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-right: 0.5rem;
    }

    .toggle-group {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .toggle {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      user-select: none;
    }

    .toggle input[type="checkbox"] { display: none; }

    .toggle-track {
      width: 36px;
      height: 20px;
      background: var(--border);
      border-radius: 10px;
      position: relative;
      transition: background 0.2s;
    }

    .toggle-track::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 14px;
      height: 14px;
      background: var(--text-muted);
      border-radius: 50%;
      transition: left 0.2s, background 0.2s;
    }

    .toggle input:checked + .toggle-track {
      background: var(--accent);
    }

    .toggle input:checked + .toggle-track::after {
      left: 19px;
      background: white;
    }

    .toggle-label {
      font-size: 0.85rem;
      color: var(--text);
    }

    .divider {
      width: 1px;
      height: 24px;
      background: var(--border);
    }

    /* Direction switch */
    .direction-switch {
      display: flex;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .direction-btn {
      padding: 0.4rem 0.9rem;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      border: none;
      background: transparent;
      transition: all 0.2s;
    }

    .direction-btn.active {
      background: var(--accent);
      color: white;
    }

    /* Converter grid */
    .converter-grid {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 1rem;
      align-items: start;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .panel:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .panel-header {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface2);
    }

    .panel-title {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .char-count {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    textarea {
      width: 100%;
      min-height: 280px;
      background: transparent;
      border: none;
      outline: none;
      padding: 1rem;
      font-size: 1rem;
      color: var(--text);
      resize: vertical;
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
    }

    .rovas-output {
      min-height: 280px;
      padding: 1rem;
      font-size: 1.4rem;
      line-height: 1.8;
      direction: rtl;
      unicode-bidi: bidi-override;
      word-break: break-all;
      color: var(--accent-light);
      cursor: text;
      user-select: all;
    }

    .rovas-output.empty {
      color: var(--text-muted);
      font-size: 0.9rem;
      direction: ltr;
      display: flex;
      align-items: center;
      justify-content: center;
      font-style: italic;
    }

    /* Arrow between panels */
    .arrow-col {
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: 3rem;
    }

    .swap-btn {
      width: 44px;
      height: 44px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.2s;
      font-size: 1.1rem;
    }

    .swap-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
      transform: rotate(180deg);
    }

    /* Action bar */
    .action-bar {
      padding: 0.75rem 1rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
    }

    .btn {
      padding: 0.4rem 0.9rem;
      border-radius: 7px;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-muted);
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .btn:hover { color: var(--text); border-color: var(--accent); }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .btn-primary:hover { background: var(--accent-light); border-color: var(--accent-light); color: white; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--surface2);
      border: 1px solid var(--accent);
      border-radius: 10px;
      padding: 0.75rem 1.2rem;
      font-size: 0.85rem;
      color: var(--accent-light);
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s;
      z-index: 100;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    /* Footer */
    footer {
      padding: 1rem 2rem;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    footer a { color: var(--accent-light); text-decoration: none; }

    /* Responsive */
    @media (max-width: 768px) {
      .converter-grid {
        grid-template-columns: 1fr;
      }
      .arrow-col {
        padding: 0;
        transform: rotate(90deg);
      }
      main { padding: 1rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">𐳢</div>
  <div>
    <h1>Rovás Konverter</h1>
    <p>Székely-magyar rovásírás · Unicode Old Hungarian</p>
  </div>
</header>

<main>
  <!-- Config panel -->
  <div class="config-panel">
    <span class="config-label">Beállítások</span>

    <div class="toggle-group">
      <label class="toggle">
        <input type="checkbox" id="toggleVowelHarmony">
        <span class="toggle-track"></span>
        <span class="toggle-label">Hangrendiség (K)</span>
      </label>

      <label class="toggle">
        <input type="checkbox" id="toggleCapitals">
        <span class="toggle-track"></span>
        <span class="toggle-label">Nagybetűk</span>
      </label>
    </div>

    <div class="divider"></div>

    <div class="toggle-group">
      <span class="toggle-label" style="color:var(--text-muted); font-size:0.82rem;">Idegen betűk:</span>
      <div class="direction-switch">
        <button class="direction-btn active" id="modeLigature" onclick="setMode('ligature')">Ligatúra</button>
        <button class="direction-btn" id="modeDecompose" onclick="setMode('decompose')">Feloldás</button>
      </div>
    </div>
  </div>

  <!-- Converter -->
  <div class="converter-grid">

    <!-- Input -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Latin bemenet</span>
        <span class="char-count" id="inputCount">0 karakter</span>
      </div>
      <textarea id="inputText" placeholder="Írj ide magyar szöveget...&#10;&#10;Pl: A régi magyarok rovásírással írtak."></textarea>
      <div class="action-bar">
        <button class="btn" onclick="clearInput()">✕ Törlés</button>
        <button class="btn" onclick="loadExample()">↺ Példa</button>
      </div>
    </div>

    <!-- Swap arrow -->
    <div class="arrow-col">
      <button class="swap-btn" onclick="swapDirection()" title="Irányváltás">⇄</button>
    </div>

    <!-- Output -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title" id="outputTitle">Rovás kimenet</span>
        <span class="char-count" id="outputCount">0 jel</span>
      </div>
      <div class="rovas-output empty" id="outputText">A kimenet itt jelenik meg</div>
      <div class="action-bar">
        <button class="btn" onclick="copyOutput()">⎘ Másolás</button>
        <button class="btn btn-primary" onclick="copyCodepoints()">U+ Kódpontok</button>
      </div>
    </div>

  </div>
</main>

<footer>
  <p>SPEC v1.2 · Unicode Old Hungarian (U+10C80–U+10CFF) · 
  Font: <a href="https://fonts.google.com/noto/specimen/Noto+Sans+Old+Hungarian" target="_blank">Noto Sans Old Hungarian</a></p>
</footer>

<div class="toast" id="toast"></div>

<!-- Rovás font -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+Old+Hungarian&display=swap">

<script type="module">
  // A library dist-ből importálva
  import { latinToRovas, rovasToLatin, numberToRovas } from './rovas-konverter/index.js';

  window._rovasLib = { latinToRovas, rovasToLatin };

  // Konfiguráció
  let config = {
    useVowelHarmonyK: false,
    useCapitals: false,
    foreignLetterMode: 'ligature',
    direction: 'rtl'
  };

  let currentMode = 'latin-to-rovas';

  // Konverzió
  function convert() {
    const input = document.getElementById('inputText').value;
    const output = document.getElementById('outputText');
    const count = document.getElementById('outputCount');

    if (!input.trim()) {
      output.textContent = 'A kimenet itt jelenik meg';
      output.classList.add('empty');
      count.textContent = '0 jel';
      return;
    }

    try {
      let result;
      if (currentMode === 'latin-to-rovas') {
        result = latinToRovas(input, config);
      } else {
        result = rovasToLatin(input);
      }

      output.textContent = result;
      output.classList.remove('empty');
      output.style.fontFamily = currentMode === 'latin-to-rovas'
        ? "'Noto Sans Old Hungarian', serif"
        : "'Inter', sans-serif";
      output.style.direction = currentMode === 'latin-to-rovas' ? 'rtl' : 'ltr';

      const chars = [...result];
      count.textContent = chars.length + ' jel';
    } catch (e) {
      output.textContent = 'Hiba: ' + e.message;
      output.classList.add('empty');
    }
  }

  // Input esemény
  document.getElementById('inputText').addEventListener('input', () => {
    const val = document.getElementById('inputText').value;
    document.getElementById('inputCount').textContent = val.length + ' karakter';
    convert();
  });

  // Toggle-k
  document.getElementById('toggleVowelHarmony').addEventListener('change', e => {
    config.useVowelHarmonyK = e.target.checked;
    convert();
  });

  document.getElementById('toggleCapitals').addEventListener('change', e => {
    config.useCapitals = e.target.checked;
    convert();
  });

  // Mód váltás
  window.setMode = function(mode) {
    config.foreignLetterMode = mode;
    document.getElementById('modeLigature').classList.toggle('active', mode === 'ligature');
    document.getElementById('modeDecompose').classList.toggle('active', mode === 'decompose');
    convert();
  };

  // Irányváltás
  window.swapDirection = function() {
    const inputEl = document.getElementById('inputText');
    const outputEl = document.getElementById('outputText');
    const current = inputEl.value;
    const converted = outputEl.textContent;

    if (currentMode === 'latin-to-rovas') {
      currentMode = 'rovas-to-latin';
      document.getElementById('outputTitle').textContent = 'Latin kimenet';
      outputEl.style.direction = 'ltr';
    } else {
      currentMode = 'latin-to-rovas';
      document.getElementById('outputTitle').textContent = 'Rovás kimenet';
    }

    if (converted && !outputEl.classList.contains('empty')) {
      inputEl.value = converted;
      document.getElementById('inputCount').textContent = converted.length + ' karakter';
    }
    convert();
  };

  // Törlés
  window.clearInput = function() {
    document.getElementById('inputText').value = '';
    document.getElementById('inputCount').textContent = '0 karakter';
    convert();
  };

  // Példa
  window.loadExample = function() {
    const examples = [
      'A régi magyarok rovásírással írtak.',
      'Székelyföld örök.',
      'Attila király 2026-ban él tovább.',
      'Különleges kísérlet: csodaszarvas.',
    ];
    const pick = examples[Math.floor(Math.random() * examples.length)];
    document.getElementById('inputText').value = pick;
    document.getElementById('inputCount').textContent = pick.length + ' karakter';
    convert();
  };

  // Másolás
  window.copyOutput = function() {
    const text = document.getElementById('outputText').textContent;
    if (!text || document.getElementById('outputText').classList.contains('empty')) return;
    navigator.clipboard.writeText(text).then(() => showToast('✓ Kimenet másolva'));
  };

  window.copyCodepoints = function() {
    const text = document.getElementById('outputText').textContent;
    if (!text || document.getElementById('outputText').classList.contains('empty')) return;
    const codepoints = [...text].map(c => 'U+' + c.codePointAt(0).toString(16).toUpperCase().padStart(4,'0')).join(' ');
    navigator.clipboard.writeText(codepoints).then(() => showToast('✓ Kódpontok másolva'));
  };

  // Toast
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // Init
  window.addEventListener('load', () => {
    // Betöltünk egy példát
    const example = 'Székelyföld örök.';
    document.getElementById('inputText').value = example;
    document.getElementById('inputCount').textContent = example.length + ' karakter';
    convert();
  });
</script>

</body>
</html>
